MACOSX_SDK_VERSION:
- '11.0'
channel_sources:
- conda-forge
channel_targets:
- conda-forge main
cross_target_platform:
- win-arm64
rust_arch:
- aarch64-pc-windows-msvc
rust_arch_env:
- AARCH64_PC_WINDOWS_MSVC
rust_arch_env_build:
- AARCH64_PC_WINDOWS_MSVC
rust_default_cc:
- clang-cl
rust_default_cc_build:
- clang-cl
target_c_stdlib_version:
- '0'
target_platform:
- win-arm64
vc:
- '14'
version:
- 1.95.0
zip_keys:
- - cross_target_platform
